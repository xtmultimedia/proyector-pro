<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProYector Pro — Calculadora de Distancias</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main class="card">

  <!-- Encabezado -->
  <header class="header">
    <h1>📽️ ProYector Pro</h1>
    <p>Calculadora de Distancias — Proyectores Epson Pro</p>
  </header>

  <!-- Selector de modelo -->
  <p class="section-title">Modelo de proyector</p>
  <label for="model">Proyector</label>
  <select id="model" onchange="updateLenses()">
    <!-- Se rellena dinámicamente por calculator.js -->
  </select>

  <!-- Selector de lente -->
  <label for="lens">Lente</label>
  <select id="lens">
    <!-- Se rellena dinámicamente según el modelo -->
  </select>

  <!-- Ancho de pantalla -->
  <p class="section-title">Ancho de pantalla</p>
  <div class="row">
    <div class="field">
      <label for="width">Ancho</label>
      <input
        type="number"
        id="width"
        placeholder="Ej: 3.0"
        min="0.01"
        step="0.01"
      />
    </div>
    <div class="field">
      <label for="unit">Unidad</label>
      <select id="unit">
        <option value="m">Metros (m)</option>
        <option value="ft">Pies (ft)</option>
        <option value="in">Pulgadas (in)</option>
      </select>
    </div>
  </div>

  <!-- Diagonal de pantalla (opcional) -->
  <p class="section-title">Diagonal de pantalla (opcional)</p>
  <div class="row">
    <div class="field">
      <label for="diagonal">Diagonal</label>
      <input
        type="number"
        id="diagonal"
        placeholder='Ej: 120"'
        min="0.01"
        step="0.1"
        oninput="calcWidthFromDiagonal()"
      />
    </div>
    <div class="field">
      <label for="diag-unit">Unidad</label>
      <select id="diag-unit" onchange="calcWidthFromDiagonal()">
        <option value="in">Pulgadas (in)</option>
        <option value="m">Metros (m)</option>
        <option value="ft">Pies (ft)</option>
      </select>
    </div>
    <div class="field">
      <label for="aspect">Relación</label>
      <select id="aspect" onchange="calcWidthFromDiagonal()">
        <option value="16:9">16:9</option>
        <option value="4:3">4:3</option>
        <option value="16:10">16:10</option>
      </select>
    </div>
  </div>

  <!-- Botón calcular -->
  <button class="btn-calculate" onclick="calculate()">Calcular distancia</button>

  <!-- Panel de resultados -->
  <div class="result" id="result">
    <h3>📏 Resultado</h3>
    <div class="result-row" id="res-min"></div>
    <div class="result-row" id="res-max"></div>
    <p class="result-note" id="res-note"></p>
  </div>

  <!-- Diagrama SVG -->
  <div class="diagram-wrap" id="diagram-wrap" style="display:none;">
    <svg viewBox="0 0 480 100" xmlns="http://www.w3.org/2000/svg"
         role="img" aria-label="Diagrama de distancia de proyección">

      <!-- Proyector -->
      <text x="16" y="54" font-size="32" text-anchor="middle">📽️</text>
      <text x="16" y="74" font-size="10" text-anchor="middle" fill="#555">Proyector</text>

      <!-- Flecha ← → -->
      <line x1="40" y1="48" x2="432" y2="48"
            stroke="#003087" stroke-width="2"
            marker-start="url(#arrow-left)"
            marker-end="url(#arrow-right)" />
      <!-- Etiqueta de distancia -->
      <text id="svg-dist-label" x="236" y="42"
            font-size="13" font-weight="bold"
            text-anchor="middle" fill="#003087">—</text>

      <!-- Pantalla -->
      <rect x="432" y="20" width="14" height="60" rx="2"
            fill="#003087" opacity="0.85"/>
      <text x="464" y="74" font-size="10" text-anchor="middle" fill="#555">Pantalla</text>

      <!-- Definición de puntas de flecha -->
      <defs>
        <marker id="arrow-right" markerWidth="8" markerHeight="8"
                refX="6" refY="3" orient="auto">
          <path d="M0,0 L0,6 L8,3 z" fill="#003087"/>
        </marker>
        <marker id="arrow-left" markerWidth="8" markerHeight="8"
                refX="2" refY="3" orient="auto-start-reverse">
          <path d="M0,0 L0,6 L8,3 z" fill="#003087"/>
        </marker>
      </defs>
    </svg>
  </div>

</main>

<!-- Footer -->
<footer>
  Fórmula: <strong>Distancia = Throw Ratio × Ancho de pantalla</strong>
</footer>

<script src="calculator.js"></script>
</body>
</html>
